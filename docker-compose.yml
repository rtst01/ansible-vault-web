services:
  backend:
    build: .
    container_name: ansible-vault-backend
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=WARNING
      - ALLOWED_ORIGINS=http://localhost,http://localhost:80
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: ansible-vault-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
