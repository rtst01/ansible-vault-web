version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile        # если другой — поправь
      # platforms можно указать здесь, если собираешь локально buildx bake
      # platforms: ["linux/amd64"]
    image: ghcr.io/rtst01/ansible-vault-web/backend
    container_name: ansible-vault-backend
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=INFO
    volumes:
      - ./app:/app/app
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile         # если другой — поправь
      # platforms: ["linux/amd64"]
    image: ghcr.io/rtst01/ansible-vault-web/frontend
    container_name: ansible-vault-frontend
    ports:
      - "80:80"
    environment:
      - REACT_APP_DOCKER=true
      - NODE_ENV=production
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
