name: Compose → Build & Push (GHCR)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write   # нужно для ghcr

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}
  REPO:  ${{ github.event.repository.name }}

jobs:
  bake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "LATEST=latest" >> $GITHUB_OUTPUT
          fi
          echo "SHA=${{ github.sha }}" >> $GITHUB_OUTPUT

      # BuildKit Bake читает docker-compose.yml и строит цели по сервисам.
      # Проставим по 2 тега каждому сервису: <sha> и latest (только для main).
      - name: Build & Push with Bake
        uses: docker/bake-action@v5
        with:
          files: docker-compose.yml
          push: ${{ github.event_name != 'pull_request' }}
          set: |
            # кэш
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
      
            # теги по сервисам (таргетам compose): backend и frontend
            backend.tags=ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/backend:${{ github.sha }}
            frontend.tags=ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/frontend:${{ github.sha }}
      
            ${{ github.ref == 'refs/heads/main' && format('backend.tags=ghcr.io/{0}/{1}/backend:latest', github.repository_owner, github.event.repository.name) || '' }}
            ${{ github.ref == 'refs/heads/main' && format('frontend.tags=ghcr.io/{0}/{1}/frontend:latest', github.repository_owner, github.event.repository.name) || '' }}

