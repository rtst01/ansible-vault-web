name: Compose → Build & Push (Bake)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}
  REPO:  ${{ github.event.repository.name }}

jobs:
  bake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Теги формируем единообразно: latest на main + sha
      - name: Compute tags
        id: tags
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "LATEST_TAG=latest" >> $GITHUB_OUTPUT
          fi
          echo "SHA_TAG=${{ github.sha }}" >> $GITHUB_OUTPUT

      # Bake читает docker-compose.yml; через set задаем теги всем таргетам
      - name: Build & Push by Bake
        uses: docker/bake-action@v5
        with:
          files: |
            docker-compose.yml
          push: ${{ github.event_name != 'pull_request' }}
          set: |
            *.tags=${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO }}/{{.target}}:${{ steps.tags.outputs.SHA_TAG }}
            ${{ steps.tags.outputs.LATEST_TAG && format('*.tags={0}/{1}/{2}/{{.target}}:{3}', env.REGISTRY, env.OWNER, env.REPO, steps.tags.outputs.LATEST_TAG) || '' }}
          provenance: false
